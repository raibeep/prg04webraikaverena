<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Usuario</title>
    <link rel="icon" href="/assets/img/favicon.png" type="image/png">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="wrapper">
        <header class="apresentacao">
            <img src="/assets/img/favicon.png" alt="Logo da empresa" class="logo">

            <h1>Bem-vindo de volta</h1>
            <h2>Conecte-se com empreendedores do mundo todo</h2>
        </header>
        <main class="container">
            <form action="#" method="post">
                <h1>Login</h1>
                <div class="input-box">
                    <input placeholder="Usuário" type="email" class="input-user" required>            
                </div>
                <div class="input-box">
                    <input placeholder="Senha" type="password" class="input-password" required minlength="8"> 
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox">
                        Lembrar senha
                    </label>
                    <a href="#">Esqueci minha senha</a>
                </div>

                <button type="submit" class="login">Login</button>

                <div class="register-link">
                    <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
